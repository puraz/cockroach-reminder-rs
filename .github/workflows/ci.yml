name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    if: github.ref_type != 'tag'
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS (arm64)
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS (x86_64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (x86_64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: Linux (x86_64)

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps (tray-icon / notify-rust)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libnotify-dev

      - name: cargo check
        run: cargo check --target ${{ matrix.target }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: '.exe'
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ''

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libnotify-dev \
            libxdo-dev

      - name: cargo build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Windows: zip with .exe
            SRC="target/${{ matrix.target }}/release/cockroach-reminder.exe"
            7z a "cockroach-reminder-${TAG}-${{ matrix.target }}.zip" "$SRC"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            # macOS: .app bundle (double-clickable)
            APP="target/cockroach-reminder.app"
            mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
            cp "target/${{ matrix.target }}/release/cockroach-reminder" "$APP/Contents/MacOS/"
            # Generate .icns from icon.png
            sips -s format icns assets/icon.png --out "$APP/Contents/Resources/AppIcon.icns" 2>/dev/null || true
            PLIST="$APP/Contents/Info.plist"
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict>' \
              '<key>CFBundleExecutable</key>' \
              '<string>cockroach-reminder</string>' \
              '<key>CFBundleIdentifier</key>' \
              '<string>com.cockroach.reminder</string>' \
              '<key>CFBundleName</key>' \
              '<string>Cockroach Reminder</string>' \
              '<key>CFBundleVersion</key>' \
              "<string>${TAG#v}</string>" \
              '<key>CFBundleShortVersionString</key>' \
              "<string>${TAG#v}</string>" \
              '<key>CFBundleIconFile</key>' \
              '<string>AppIcon</string>' \
              '<key>CFBundlePackageType</key>' \
              '<string>APPL</string>' \
              '<key>LSMinimumSystemVersion</key>' \
              '<string>11.0</string>' \
              '<key>LSUIElement</key>' \
              '<true/>' \
              '</dict>' \
              '</plist>' > "$PLIST"
            tar czf "cockroach-reminder-${TAG}-${{ matrix.target }}.tar.gz" -C "$(dirname "$APP")" "$(basename "$APP")"
          else
            # Linux: raw binary tar.gz
            SRC="target/${{ matrix.target }}/release/cockroach-reminder"
            tar czf "cockroach-reminder-${TAG}-${{ matrix.target }}.tar.gz" -C "$(dirname "$SRC")" "$(basename "$SRC")"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: cockroach-reminder-*
          generate_release_notes: true
