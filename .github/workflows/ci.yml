name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    if: github.ref_type != 'tag'
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS (arm64)
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS (x86_64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (x86_64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: Linux (x86_64)

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps (tray-icon / notify-rust)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libnotify-dev

      - name: cargo check
        run: cargo check --target ${{ matrix.target }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: '.exe'
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ''

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libnotify-dev

      - name: cargo build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          SRC="target/${{ matrix.target }}/release/cockroach-reminder${{ matrix.suffix }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Windows: zip with .exe
            7z a "cockroach-reminder-${TAG}-${{ matrix.target }}.zip" "$SRC"
            echo "ASSET=cockroach-reminder-${TAG}-${{ matrix.target }}.zip" >> "$GITHUB_ENV"
          else
            # macOS / Linux: tar.gz
            tar czf "cockroach-reminder-${TAG}-${{ matrix.target }}.tar.gz" -C "$(dirname "$SRC")" "$(basename "$SRC")"
            echo "ASSET=cockroach-reminder-${TAG}-${{ matrix.target }}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: cockroach-reminder-*
          generate_release_notes: true
