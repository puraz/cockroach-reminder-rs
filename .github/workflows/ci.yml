name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS (arm64)
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS (x86_64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (x86_64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: Linux (x86_64)

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps (tray-icon / notify-rust)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libnotify-dev

      - name: cargo check
        run: cargo check --target ${{ matrix.target }}

  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS (arm64)

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cargo build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cockroach-reminder-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/cockroach-reminder${{ runner.os == 'Windows' && '.exe' || '' }}
